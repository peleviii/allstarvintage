server {
    listen 80;
    server_name allstarvintage.gr www.allstarvintage.gr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name allstarvintage.gr www.allstarvintage.gr;

    ssl_certificate /etc/letsencrypt/live/allstarvintage.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allstarvintage.gr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;

    location ~* \.(html|css|js|svg|ico|png|jpg|jpeg|webp|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
