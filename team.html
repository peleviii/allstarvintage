<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ομάδα | All Star Vintage Tournament</title>
<style>
  @font-face { font-family: 'Bebas Neue'; src: url('fonts/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Barlow Condensed'; src: url('fonts/BarlowCondensed-Regular.ttf'); font-weight: 400; }
  @font-face { font-family: 'Barlow Condensed'; src: url('fonts/BarlowCondensed-Bold.ttf'); font-weight: 700; }
  :root { --cream: #EEF6FF; --gold: #6dcaf3; --dark: #0d1f3c; --blue: #1f3464; --sand: #a8d8f0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); font-family: 'Barlow Condensed', sans-serif; color: var(--dark); }
  .site-header { width: 100%; height: 180px; position: sticky; top: 0; z-index: 100; overflow: hidden; display: block; }
  .hdr-left { position: absolute; inset: 0; background: #ffffff; clip-path: polygon(0 0, 83% 0, 79% 76%, 0 100%); }
  .hdr-right { position: absolute; inset: 0; background: #1f3464; clip-path: polygon(100% 0, 83% 0, 79% 76%, 100% 100%); }
  .header-logo-left { position: absolute; left: 64px; top: 50%; transform: translateY(-50%); height: 120px; width: auto; object-fit: contain; z-index: 2; }
  .header-logo-right { position: absolute; right: 32px; top: 50%; transform: translateY(-50%); height: 70px; width: auto; object-fit: contain; z-index: 2; }
  .site-footer { width: 100%; height: 100px; position: sticky; bottom: 0; z-index: 100; overflow: hidden; display: block; }
  .ftr-left { position: absolute; inset: 0; background: #ffffff; clip-path: polygon(0 0, 79% 24%, 83% 100%, 0 100%); }
  .ftr-right { position: absolute; inset: 0; background: #1f3464; clip-path: polygon(100% 0, 79% 24%, 83% 100%, 100% 100%); }
  .footer-logo-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); height: 60px; width: auto; object-fit: contain; z-index: 2; }
  @media (max-width: 900px) {
    .site-header { height: 90px; } .header-logo-left { height: 60px; left: 16px; } .header-logo-right { height: 40px; right: 16px; }
    .site-footer { height: 60px; } .footer-logo-center { height: 36px; }
  }
  .team-hero { background: var(--dark); padding: 60px 40px; text-align: center; position: relative; overflow: hidden; }
  .team-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(109,202,243,0.1) 0%, transparent 70%); }
  .team-photo { width: 100%; max-height: 340px; object-fit: cover; margin-bottom: 32px; border: 2px solid rgba(109,202,243,0.3); }
  .team-logo { width: 100px; height: 100px; object-fit: contain; margin: 0 auto 20px; display: block; position: relative; z-index: 1; }
  .team-name-title { font-family: 'Bebas Neue'; font-size: clamp(2.5rem, 8vw, 5rem); color: white; letter-spacing: 3px; position: relative; z-index: 1; }
  .team-city-title { font-size: 0.85rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 8px; position: relative; z-index: 1; }
  .page { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
  .staff-section { background: white; border: 1px solid rgba(109,202,243,0.2); padding: 32px; margin-bottom: 32px; }
  .section-title { font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: 2px; color: var(--blue); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid var(--gold); }
  .staff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .staff-item { display: flex; flex-direction: column; gap: 4px; }
  .staff-role { font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  .staff-name { font-size: 1.1rem; color: var(--dark); font-weight: 700; }
  .roster-section { background: white; border: 1px solid rgba(109,202,243,0.2); padding: 32px; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--blue); }
  thead th { padding: 12px 16px; text-align: left; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: white; font-weight: 700; }
  tbody tr { border-bottom: 1px solid rgba(109,202,243,0.1); transition: background 0.2s; }
  tbody tr:hover { background: var(--cream); }
  tbody td { padding: 14px 16px; font-size: 1rem; color: var(--dark); }
  .jersey { font-family: 'Bebas Neue'; font-size: 1.5rem; color: var(--blue); width: 60px; }
  .gender-badge { display: inline-block; padding: 2px 10px; font-size: 0.7rem; letter-spacing: 2px; font-weight: 700; }
  .gender-badge.M { background: rgba(109,202,243,0.15); color: var(--blue); }
  .gender-badge.F { background: rgba(109,202,243,0.25); color: var(--blue); }
  .loading { text-align: center; padding: 60px; font-size: 1.2rem; letter-spacing: 2px; color: var(--blue); opacity: 0.5; }
  .error-msg { text-align: center; padding: 60px; color: #721c24; font-size: 1.1rem; }
  @media (max-width: 600px) { .staff-grid { grid-template-columns: 1fr; } .team-hero { padding: 40px 20px; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="hdr-left"></div>
  <div class="hdr-right"></div>
  <a href="https://www.patt.gov.gr/" target="_blank" rel="noopener">
    <img src="img/Agkalia_Attikis_logo_4.png" alt="Αγκαλιά της Αττικής" class="header-logo-left"/>
  </a>
  <a href="https://www.patt.gov.gr/" target="_blank" rel="noopener">
    <img src="img/perifereia_logo.png" alt="Περιφέρεια Αττικής" class="header-logo-right"/>
  </a>
</header>

<div id="loading" class="loading">Φόρτωση ομάδας...</div>
<div id="content" style="display:none">
  <div class="team-hero">
    <img id="teamLogo" class="team-logo" alt="Logo ομάδας">
    <div id="teamName" class="team-name-title"></div>
    <div id="teamCity" class="team-city-title"></div>
    <img id="teamPhoto" class="team-photo" style="display:none" alt="Ομαδική φωτογραφία">
  </div>
  <div class="page">
    <div class="staff-section">
      <div class="section-title">Τεχνικό Επιτελείο</div>
      <div class="staff-grid">
        <div class="staff-item"><span class="staff-role">Προπονητής</span><span class="staff-name" id="coach">—</span></div>
        <div class="staff-item"><span class="staff-role">Βοηθός Προπονητή</span><span class="staff-name" id="assistant_coach">—</span></div>
        <div class="staff-item"><span class="staff-role">Φυσιοθεραπευτής</span><span class="staff-name" id="physiotherapist">—</span></div>
        <div class="staff-item"><span class="staff-role">Team Manager</span><span class="staff-name" id="team_manager">—</span></div>
      </div>
    </div>
    <div class="roster-section">
      <div class="section-title">Roster Παικτών</div>
      <table>
        <thead><tr><th>#</th><th>Όνομα</th><th>Επώνυμο</th><th>Φύλο</th></tr></thead>
        <tbody id="rosterBody"></tbody>
      </table>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="ftr-left"></div>
  <div class="ftr-right"></div>
  <a href="https://www.markopoulo.gr/" target="_blank" rel="noopener">
    <img src="img/logo_marko.png" alt="Δήμος Μαρκοπούλου" class="footer-logo-center"/>
  </a>
</footer>

<script>
const teamId = new URLSearchParams(window.location.search).get('id');
const DUMMY_PHOTO = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200"><rect width="400" height="200" fill="#0d1f3c"/><text x="200" y="90" font-family="Arial" font-size="48" fill="#6dcaf3" text-anchor="middle">🏐</text><text x="200" y="140" font-family="Arial" font-size="16" fill="#a8d8f0" text-anchor="middle">Ομαδική Φωτογραφία</text></svg>`);
const DUMMY_LOGO = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="#1f3464" rx="50"/><text x="50" y="65" font-family="Arial" font-size="40" fill="#6dcaf3" text-anchor="middle">🏐</text></svg>`);
async function load() {
  try {
    const res = await fetch(`/api/teams/${teamId}`);
    if (!res.ok) throw new Error('Not found');
    const { team, players } = await res.json();
    document.title = team.name + ' | ASV 2026';
    const photoEl = document.getElementById('teamPhoto');
    photoEl.src = team.photo_path || DUMMY_PHOTO;
    photoEl.style.display = 'block';
    document.getElementById('teamLogo').src = team.logo_path || DUMMY_LOGO;
    document.getElementById('teamName').textContent = team.name;
    document.getElementById('teamCity').textContent = team.city || '';
    document.getElementById('coach').textContent = team.coach || '—';
    document.getElementById('assistant_coach').textContent = team.assistant_coach || '—';
    document.getElementById('physiotherapist').textContent = team.physiotherapist || '—';
    document.getElementById('team_manager').textContent = team.team_manager || '—';
    const tbody = document.getElementById('rosterBody');
    if (players.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;opacity:0.5">Δεν υπάρχουν παίκτες</td></tr>';
    } else {
      players.forEach(p => {
        const gL = p.gender === 'Α' ? 'ΑΝΔΡΑΣ' : p.gender === 'Γ' ? 'ΓΥΝΑΙΚΑ' : p.gender || '';
        const gC = p.gender === 'Α' ? 'M' : 'F';
        tbody.innerHTML += `<tr><td class="jersey">${p.jersey_number}</td><td>${p.first_name}</td><td><strong>${p.last_name}</strong></td><td><span class="gender-badge ${gC}">${gL}</span></td></tr>`;
      });
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').innerHTML = '<div class="error-msg">❌ Η ομάδα δεν βρέθηκε.</div>';
  }
}
load();
</script>
</body>
</html>
