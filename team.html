<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ομάδα | All Star Vintage Tournament</title>
<style>
  @font-face { font-family: 'Bebas Neue'; src: url('../fonts/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Barlow Condensed'; src: url('../fonts/BarlowCondensed-Regular.ttf'); font-weight: 400; }
  @font-face { font-family: 'Barlow Condensed'; src: url('../fonts/BarlowCondensed-Bold.ttf'); font-weight: 700; }

  :root {
    --cream: #EEF6FF;
    --gold: #6dcaf3;
    --dark: #0d1f3c;
    --blue: #1f3464;
    --sand: #a8d8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); font-family: 'Barlow Condensed', sans-serif; color: var(--dark); }

  nav {
    background: rgba(31,52,100,0.96);
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--gold); letter-spacing: 2px; text-decoration: none; }
  .nav-back { color: var(--sand); font-size: 0.85rem; letter-spacing: 2px; text-decoration: none; }
  .nav-back:hover { color: var(--gold); }

  /* HERO */
  .team-hero {
    background: var(--dark);
    padding: 60px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .team-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(109,202,243,0.1) 0%, transparent 70%);
  }

  .team-photo {
    width: 100%;
    max-height: 340px;
    object-fit: cover;
    margin-bottom: 32px;
    border: 2px solid rgba(109,202,243,0.3);
  }

  .team-logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    margin: 0 auto 20px;
    display: block;
    position: relative;
    z-index: 1;
  }

  .team-name-title {
    font-family: 'Bebas Neue';
    font-size: clamp(2.5rem, 8vw, 5rem);
    color: white;
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
  }

  .team-city-title {
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* STAFF */
  .page { max-width: 900px; margin: 0 auto; padding: 48px 24px; }

  .staff-section {
    background: white;
    border: 1px solid rgba(109,202,243,0.2);
    padding: 32px;
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Bebas Neue';
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: var(--blue);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gold);
  }

  .staff-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .staff-item { display: flex; flex-direction: column; gap: 4px; }

  .staff-role {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
  }

  .staff-name {
    font-size: 1.1rem;
    color: var(--dark);
    font-weight: 700;
  }

  /* ROSTER TABLE */
  .roster-section {
    background: white;
    border: 1px solid rgba(109,202,243,0.2);
    padding: 32px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--blue);
  }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
    font-weight: 700;
  }

  tbody tr {
    border-bottom: 1px solid rgba(109,202,243,0.1);
    transition: background 0.2s;
  }

  tbody tr:hover { background: var(--cream); }

  tbody td {
    padding: 14px 16px;
    font-size: 1rem;
    color: var(--dark);
  }

  .jersey {
    font-family: 'Bebas Neue';
    font-size: 1.5rem;
    color: var(--blue);
    width: 60px;
  }

  .gender-badge {
    display: inline-block;
    padding: 2px 10px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .gender-badge.M { background: rgba(109,202,243,0.15); color: var(--blue); }
  .gender-badge.F { background: rgba(109,202,243,0.25); color: var(--blue); }

  .loading {
    text-align: center;
    padding: 60px;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--blue);
    opacity: 0.5;
  }

  .error-msg {
    text-align: center;
    padding: 60px;
    color: #721c24;
    font-size: 1.1rem;
  }

  @media (max-width: 600px) {
    nav { padding: 16px 20px; }
    .staff-grid { grid-template-columns: 1fr; }
    .team-hero { padding: 40px 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">ASV · 2026</a>
  <a href="/#teams" class="nav-back">← Πίσω στις Ομάδες</a>
</nav>

<div id="loading" class="loading">Φόρτωση ομάδας...</div>
<div id="content" style="display:none">

  <!-- HERO -->
  <div class="team-hero">
    <img id="teamPhoto" class="team-photo" style="display:none" alt="Ομαδική φωτογραφία">
    <img id="teamLogo" class="team-logo" alt="Logo ομάδας">
    <div id="teamName" class="team-name-title"></div>
    <div id="teamCity" class="team-city-title"></div>
  </div>

  <div class="page">
    <!-- STAFF -->
    <div class="staff-section">
      <div class="section-title">Τεχνικό Τιμωρό</div>
      <div class="staff-grid">
        <div class="staff-item">
          <span class="staff-role">Προπονητής</span>
          <span class="staff-name" id="coach">—</span>
        </div>
        <div class="staff-item">
          <span class="staff-role">Βοηθός Προπονητή</span>
          <span class="staff-name" id="assistant_coach">—</span>
        </div>
        <div class="staff-item">
          <span class="staff-role">Φυσιοθεραπευτής</span>
          <span class="staff-name" id="physiotherapist">—</span>
        </div>
        <div class="staff-item">
          <span class="staff-role">Team Manager</span>
          <span class="staff-name" id="team_manager">—</span>
        </div>
      </div>
    </div>

    <!-- ROSTER -->
    <div class="roster-section">
      <div class="section-title">Roster Παικτών</div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Όνομα</th>
            <th>Επώνυμο</th>
            <th>Φύλο</th>
          </tr>
        </thead>
        <tbody id="rosterBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const teamId = window.location.pathname.split('/').pop();
const DUMMY_PHOTO = 'data:image/svg+xml,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0d1f3c"/>
  <text x="200" y="90" font-family="Arial" font-size="48" fill="#6dcaf3" text-anchor="middle">🏐</text>
  <text x="200" y="140" font-family="Arial" font-size="16" fill="#a8d8f0" text-anchor="middle">Ομαδική Φωτογραφία</text>
</svg>`);

const DUMMY_LOGO = 'data:image/svg+xml,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1f3464" rx="50"/>
  <text x="50" y="65" font-family="Arial" font-size="40" fill="#6dcaf3" text-anchor="middle">🏐</text>
</svg>`);

async function load() {
  try {
    const res = await fetch(`/api/teams/${teamId}`);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    const { team, players } = data;

    document.title = team.name + ' | ASV 2026';

    // Photo
    const photoEl = document.getElementById('teamPhoto');
    photoEl.src = team.photo_path || DUMMY_PHOTO;
    photoEl.style.display = 'block';

    // Logo
    const logoEl = document.getElementById('teamLogo');
    logoEl.src = team.logo_path || DUMMY_LOGO;

    document.getElementById('teamName').textContent = team.name;
    document.getElementById('teamCity').textContent = team.city || '';

    // Staff
    document.getElementById('coach').textContent = team.coach || '—';
    document.getElementById('assistant_coach').textContent = team.assistant_coach || '—';
    document.getElementById('physiotherapist').textContent = team.physiotherapist || '—';
    document.getElementById('team_manager').textContent = team.team_manager || '—';

    // Roster
    const tbody = document.getElementById('rosterBody');
    if (players.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;opacity:0.5">Δεν υπάρχουν παίκτες</td></tr>';
    } else {
      players.forEach(p => {
        const genderLabel = p.gender === 'Α' ? 'ΑΝΔΡΑΣ' : p.gender === 'Γ' ? 'ΓΥΝΑΙΚΑ' : p.gender || '';
        const genderClass = p.gender === 'Α' ? 'M' : 'F';
        tbody.innerHTML += `
          <tr>
            <td class="jersey">${p.jersey_number}</td>
            <td>${p.first_name}</td>
            <td><strong>${p.last_name}</strong></td>
            <td><span class="gender-badge ${genderClass}">${genderLabel}</span></td>
          </tr>`;
      });
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (err) {
    document.getElementById('loading').innerHTML = '<div class="error-msg">❌ Η ομάδα δεν βρέθηκε.</div>';
  }
}

load();
</script>
</body>
</html>
