services:
  # Nginx - Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allstarvintage
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./rules.html:/usr/share/nginx/html/rules.html
      - ./fonts:/usr/share/nginx/html/fonts
      - ./img:/usr/share/nginx/html/img
      - ./uploads:/usr/share/nginx/html/uploads
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - internal

  # Node.js API
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: allstarvintage_api
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=allstarvintage
      - DB_USER=avuser
      - DB_PASS=avpass2026
      - PORT=3000
      - UPLOAD_DIR=/uploads
    volumes:
      - ./uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: allstarvintage_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=allstarvintage
      - POSTGRES_USER=avuser
      - POSTGRES_PASSWORD=avpass2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avuser -d allstarvintage"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge