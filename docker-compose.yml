services:
  web:
    build: .
    container_name: allstarvintage
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./fonts:/usr/share/nginx/html/fonts
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # docker-compose.yml - πρόσθεσε στα volumes:
      - ./img/logos:/usr/share/nginx/html/img/logos
    networks:
      - web

networks:
  web:
    driver: bridge