services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allstarvintage_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=allstarvintage
      - DB_USERNAME=avuser
      - DB_PASSWORD=avpass2026

  web:
    image: nginx:alpine
    container_name: allstarvintage_web
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

  db:
    image: mysql:8.0
    container_name: allstarvintage_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: allstarvintage
      MYSQL_USER: avuser
      MYSQL_PASSWORD: avpass2026
      MYSQL_ROOT_PASSWORD: rootpass2026
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  mysqldata:

networks:
  internal:
    driver: bridge