server {
    listen 80;
    server_name allstarvintage.gr www.allstarvintage.gr localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    # Static files
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|webp|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # API proxy → Node.js
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }

    # Uploads
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
    }

    # Pages - serve HTML files directly
    location ~* \.html$ {
        try_files $uri =404;
    }

    # SPA routing fallback for non-file requests
    location / {
        if (!-e $request_filename) {
            rewrite ^.*$ /index.html last;
        }
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}